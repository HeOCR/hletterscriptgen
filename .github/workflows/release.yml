name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build distributions and attach to release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify built version matches tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(PYTHONPATH=src python -c 'from hletterscriptgen import __version__; print(__version__)')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag $tag_version does not match package version $pkg_version" >&2
            exit 1
          fi

      - name: Upload distributions as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hletterscriptgen-${{ github.ref_name }}
          path: dist/*

      - name: Create GitHub release with built artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
