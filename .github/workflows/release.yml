name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# PyPI publishing is intentionally out of scope for this workflow until
# the HeOCR org sets up trusted publishing. The release job only builds,
# validates, and attaches sdist + wheel to a GitHub release; users can
# install from the release asset until PyPI is wired up.

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build distributions and attach to release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify built distributions
        run: twine check dist/*

      - name: Verify built version matches tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(PYTHONPATH=src python -c 'from hletterscriptgen import __version__; print(__version__)')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag $tag_version does not match package version $pkg_version" >&2
            exit 1
          fi

      - name: Upload distributions as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hletterscriptgen-${{ github.ref_name }}
          path: dist/*

      - name: Create GitHub release with built artifacts
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: dist/*
          generate_release_notes: true
