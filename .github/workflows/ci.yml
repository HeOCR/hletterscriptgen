name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[lint]"

      - name: Run ruff
        run: ruff check .

  typecheck:
    name: Type check (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install typecheck + runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[typecheck]"

      - name: Run mypy
        run: mypy

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest

      - name: CLI smoke — version
        run: hletterscriptgen version

      - name: CLI smoke — schema id
        run: hletterscriptgen schema --format json

      - name: CLI smoke — validate example
        run: hletterscriptgen validate examples/letter_set/writer_example.json --format json

  package:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Install wheel in clean venv and smoke-test
        run: |
          python -m venv .ci-wheel-venv
          . .ci-wheel-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/hletterscriptgen-*.whl
          hletterscriptgen version
          hletterscriptgen validate examples/letter_set/writer_example.json --format json

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hletterscriptgen-dist
          path: dist/*
