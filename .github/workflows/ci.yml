name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest

      - name: CLI smoke — version
        run: hletterscriptgen version

      - name: CLI smoke — schema id
        run: hletterscriptgen schema --format json

      - name: CLI smoke — validate example
        run: hletterscriptgen validate examples/letter_set/writer_example.json --format json

  package:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel in clean venv and smoke-test
        run: |
          python -m venv .ci-wheel-venv
          . .ci-wheel-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/hletterscriptgen-*.whl
          hletterscriptgen version
          hletterscriptgen validate examples/letter_set/writer_example.json --format json

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: hletterscriptgen-dist
          path: dist/*
